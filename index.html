<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ระบบโรงเรียน I.C.E.C</title>
<style>
body { font-family: Arial; background:#eef2f7; text-align:center; }
.box { background:white; padding:20px; margin:20px auto; width:380px; border-radius:10px; box-shadow:0 0 10px gray;}
input, select { padding:8px; margin:5px; width:90%; }
button { padding:10px; margin:5px; border:none; border-radius:5px; cursor:pointer; background:#4CAF50; color:white;}
.admin { background:#222; color:white; }
</style>
</head>

<body>

<h1>🏫 ระบบโรงเรียน PRO+</h1>

<!-- ครูลงเวลา -->
<div class="box">
<h3>👩‍🏫 ลงเวลา (ก่อน 10:00)</h3>

<select id="teacher">
<option>พิตต้า</option>
<option>วันเฮง</option>
<option>ซีเกม</option>
<option>ข้าวหอม</option>
</select>

<input type="password" id="teacherPass" placeholder="รหัสครู">
<button onclick="checkIn()">ลงเวลา</button>
<p id="checkStatus"></p>
</div>

<!-- ใส่คะแนน -->
<div class="box">
<h3>📊 ใส่คะแนนนักเรียน</h3>

<select id="class">
<option>3/1</option>
<option>3/2</option>
<option>3/3</option>
</select>

<select id="student">
<option>1</option>
<option>2</option>
</select>

<select id="subject">
<option>ภาษาไทย</option>
<option>ภาษาอังกฤษ</option>
<option>สังคม</option>
<option>การงานอาชีพ</option>
<option>พละ</option>
<option>สุขศึกษา</option>
<option>ลูกเสือ</option>
<option>คณิต</option>
<option>วิทย์</option>
<option>ศิลปะ</option>
</select>

<input type="number" id="work" placeholder="คะแนนเก็บ (70)">
<input type="number" id="exam" placeholder="คะแนนสอบ (30)">

<button onclick="saveScore()">บันทึกคะแนน</button>
<p id="result"></p>
</div>

<!-- แอดมิน -->
<div class="box admin">
<h3>🔐 ระบบแอดมิน</h3>
<input type="password" id="adminPass" placeholder="รหัสแอดมิน">
<button onclick="showAdmin()">ดูข้อมูล</button>
<pre id="adminReport"></pre>
</div>

<script>

// รหัส
let teacherPasswords = {
    "พิตต้า": "111",
    "วันเฮง": "222",
    "ซีเกม": "333",
    "ข้าวหอม": "444"
};

let adminPassword = "999";

// เก็บข้อมูล
let checkedTeachers = [];
let allTeachers = ["พิตต้า","วันเฮง","ซีเกม","ข้าวหอม"];
let scores = [];

// ลงเวลา
function checkIn(){
    let name = document.getElementById("teacher").value;
    let pass = document.getElementById("teacherPass").value;
    let hour = new Date().getHours();

    if(pass !== teacherPasswords[name]){
        alert("รหัสผิด!");
        return;
    }

    if(hour >= 10){
        document.getElementById("checkStatus").innerText = "❌ มาสาย";
    } else {
        document.getElementById("checkStatus").innerText = "✅ ลงเวลาแล้ว";
    }

    if(!checkedTeachers.includes(name)){
        checkedTeachers.push(name);
    }
}

// คำนวณเกรด (แบบมี .5)
function calcGrade(score){
    if(score >= 80) return 4;
    if(score >= 75) return 3.5;
    if(score >= 70) return 3;
    if(score >= 65) return 2.5;
    if(score >= 60) return 2;
    if(score >= 55) return 1.5;
    if(score >= 50) return 1;
    return 0;
}

// บันทึกคะแนน
function saveScore(){
    let cls = document.getElementById("class").value;
    let stu = document.getElementById("student").value;
    let sub = document.getElementById("subject").value;
    let work = Number(document.getElementById("work").value);
    let exam = Number(document.getElementById("exam").value);

    let total = (work * 0.7) + (exam * 0.3);
    let grade = calcGrade(total);

    scores.push({
        class: cls,
        student: stu,
        subject: sub,
        total: total.toFixed(2),
        grade: grade
    });

    document.getElementById("result").innerText =
    `คะแนนรวม ${total.toFixed(2)} | เกรด ${grade}`;
}

// แอดมินดูข้อมูล
function showAdmin(){
    let pass = document.getElementById("adminPass").value;

    if(pass !== adminPassword){
        alert("รหัสแอดมินผิด!");
        return;
    }

    let text = "📌 ครูที่ยังไม่ลงเวลา:\n";

    let notChecked = allTeachers.filter(t => !checkedTeachers.includes(t));
    notChecked.forEach(t => text += "- " + t + "\n");

    text += "\n📊 คะแนนนักเรียน:\n";

    scores.forEach(s=>{
        text += `ห้อง ${s.class} เลขที่ ${s.student} ${s.subject} = ${s.total} (เกรด ${s.grade})\n`;
    });

    document.getElementById("adminReport").innerText = text;
}

</script>

</body>
</html>
