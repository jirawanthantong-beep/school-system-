<script>
  const adminPassword = "admin123";

  let contestants = JSON.parse(localStorage.getItem("contestants")) || [];

  function saveData() {
    localStorage.setItem("contestants", JSON.stringify(contestants));
  }

  function loginAdmin() {
    const pass = document.getElementById("adminPass").value;

    if (pass === adminPassword) {
      document.getElementById("adminPanel").classList.remove("hidden");
      alert("เข้าสู่ระบบแอดมินสำเร็จ");
    } else {
      alert("รหัสผ่านไม่ถูกต้อง");
    }
  }

  function addContestant() {
    const name = document.getElementById("name").value.trim();
    const team = document.getElementById("team").value;
    const code = document.getElementById("code").value.trim();
    const debate = parseInt(document.getElementById("debate").value) || 0;
    const leader = parseInt(document.getElementById("leader").value) || 0;

    if (!name || !code) {
      alert("กรุณากรอกชื่อและรหัส");
      return;
    }

    const duplicate = contestants.find(person => person.code === code);
    if (duplicate) {
      alert("รหัสนี้ถูกใช้แล้ว");
      return;
    }

    const total = debate + leader;

    contestants.push({
      name,
      team,
      code,
      debate,
      leader,
      total
    });

    saveData();
    updateTable();

    document.getElementById("name").value = "";
    document.getElementById("code").value = "";
    document.getElementById("debate").value = "";
    document.getElementById("leader").value = "";
  }

  function updateTable() {
    contestants.sort((a, b) => b.total - a.total);

    const tbody = document.querySelector("#adminTable tbody");
    tbody.innerHTML = "";

    contestants.forEach((person, index) => {
      person.rank = index + 1;

      tbody.innerHTML += `
        <tr>
          <td>${person.name}</td>
          <td>${person.team}</td>
          <td>${person.code}</td>
          <td>${person.debate}</td>
          <td>${person.leader}</td>
          <td>${person.total}</td>
          <td>${person.rank}</td>
          <td>
            <button class="edit" onclick="editContestant(${index})">แก้ไข</button>
            <button class="danger" onclick="deleteContestant(${index})">ลบ</button>
          </td>
        </tr>
      `;
    });

    saveData();
  }

  function editContestant(index) {
    const person = contestants[index];

    const newName = prompt("ชื่อใหม่", person.name);
    const newTeam = prompt("ทีมใหม่ (ทีมมายู หรือ ทีมเถิด)", person.team);
    const newDebate = prompt("คะแนนโต้วาทีใหม่", person.debate);
    const newLeader = prompt("คะแนนศึกผู้นำใหม่", person.leader);

    if (newName !== null) person.name = newName;
    if (newTeam !== null && (newTeam === "ทีมมายู" || newTeam === "ทีมเถิด")) {
      person.team = newTeam;
    }
    if (newDebate !== null) person.debate = parseInt(newDebate) || 0;
    if (newLeader !== null) person.leader = parseInt(newLeader) || 0;

    person.total = person.debate + person.leader;

    saveData();
    updateTable();
  }

  function deleteContestant(index) {
    if (confirm("ต้องการลบข้อมูลนี้หรือไม่")) {
      contestants.splice(index, 1);
      saveData();
      updateTable();
    }
  }

  function exportCSV() {
    if (contestants.length === 0) {
      alert("ยังไม่มีข้อมูล");
      return;
    }

    let csvContent = "ชื่อ,ทีม,รหัส,โต้วาที,ศึกผู้นำ,รวมคะแนน,อันดับ\n";

    contestants.forEach(person => {
      csvContent += `${person.name},${person.team},${person.code},${person.debate},${person.leader},${person.total},${person.rank}\n`;
    });

    const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);

    const link = document.createElement("a");
    link.href = url;
    link.download = "ผลการแข่งขัน.csv";
    link.click();
  }

  function updateCountdown() {
    const countdownBox = document.getElementById("countdownBox");

    let targetHour = contestants.length === 0 ? 21 : 20;

    const now = new Date();
    const target = new Date();

    target.setHours(targetHour, 0, 0, 0);

    if (now >= target) {
      countdownBox.innerHTML = "เปิดให้ดูผลแล้ว";
      return;
    }

    const diff = target - now;

    const hours = Math.floor(diff / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);

    countdownBox.innerHTML = `
      เหลือเวลาอีก ${hours} ชั่วโมง ${minutes} นาที ${seconds} วินาที
      <br>
      จะเปิดดูผลเวลา ${targetHour}:00 น.
    `;
  }

  function checkScore() {
    const code = document.getElementById("userCode").value.trim();
    const resultBox = document.getElementById("resultBox");

    let releaseHour = contestants.length === 0 ? 21 : 20;

    const now = new Date();
    const currentHour = now.getHours();

    if (currentHour < releaseHour) {
      resultBox.innerHTML = `
        <p>ยังไม่สามารถดูผลได้</p>
        <p>สามารถดูผลได้ตั้งแต่เวลา ${releaseHour}:00 น.</p>
      `;
      return;
    }

    const person = contestants.find(item => item.code === code);

    if (person) {
      resultBox.innerHTML = `
        <h3>${person.name}</h3>
        <p>ทีม: ${person.team}</p>
        <p>รอบที่ 1 โต้วาที: ${person.debate} / 100</p>
        <p>รอบที่ 2 ศึกชิงความเป็นผู้นำ: ${person.leader} / 100</p>
        <p><strong>รวมคะแนน: ${person.total} / 200</strong></p>
        <div class="rank">อันดับที่ ${person.rank}</div>
      `;
    } else {
      resultBox.innerHTML = `<p>ไม่พบรหัสนี้</p>`;
    }
  }

  updateTable();
  setInterval(updateCountdown, 1000);
  updateCountdown();
</script>
