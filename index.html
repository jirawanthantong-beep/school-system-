<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ICE Examination System</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
}

body{
background:linear-gradient(135deg,#4F46E5,#7C3AED,#3B82F6);
min-height:100vh;
}

.login{
width:420px;
background:white;
padding:40px;
border-radius:25px;
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
box-shadow:0 20px 40px rgba(0,0,0,.2);
}

.logo{
font-size:55px;
font-weight:bold;
text-align:center;
color:#5B3FFF;
}

.subtitle{
text-align:center;
margin-top:10px;
margin-bottom:30px;
color:#777;
}

input{
width:100%;
padding:15px;
margin-top:15px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
outline:none;
transition:.3s;
}

input:focus{
border:1px solid #5B3FFF;
box-shadow:0 0 10px rgba(91,63,255,.3);
}

button{
width:100%;
padding:15px;
margin-top:25px;
border:none;
background:#5B3FFF;
color:white;
font-size:18px;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#4328d6;
}

.dashboard{
display:none;
padding:40px;
}

header{
background:white;
padding:20px;
border-radius:20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

header h1{
color:#5B3FFF;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
margin-top:35px;
}

.card{
background:white;
border-radius:20px;
padding:40px;
text-align:center;
cursor:pointer;
transition:.3s;
box-shadow:0 10px 20px rgba(0,0,0,.15);
}

.card:hover{
transform:translateY(-10px);
}

.card h2{
color:#5B3FFF;
margin-bottom:15px;
}

.page{
display:none;
margin-top:30px;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.back{
display:inline-block;
background:#5B3FFF;
color:white;
padding:10px 25px;
border-radius:10px;
cursor:pointer;
margin-bottom:20px;
}

.notice{
font-size:32px;
text-align:center;
padding:80px;
color:#555;
}

.choice{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
margin-top:40px;
}

.choice button{
width:240px;
}

.searchBox{
display:none;
margin-top:30px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:25px;
}

table th{
background:#5B3FFF;
color:white;
padding:12px;
}

table td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

.pass{
color:green;
font-size:28px;
font-weight:bold;
}

.fail{
color:red;
font-size:28px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="login" id="login">

<div class="logo">ICE</div>

<div class="subtitle">
International Center for Excellence
</div>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

</div>

<div class="dashboard" id="dashboard">

<header>

<h1>ICE Examination System</h1>

<button onclick="logout()" style="width:150px;margin-top:0;">Logout</button>

</header>

<div class="menu">

<div class="card" onclick="openGrade()">

<h2>ผลเกรด</h2>

<p>ตรวจสอบผลการเรียน</p>

</div>

<div class="card" onclick="openComplaint()">

<h2>ใบร้องเรียนการขอแก้สอบ</h2>

<p>ยื่นคำร้องออนไลน์</p>

</div>

<div class="card" onclick="openExam()">

<h2>ประกาศผลสอบเข้า</h2>

<p>Admission Result</p>

</div>

</div>
<div class="page" id="gradePage">

<div class="back" onclick="home()">
← กลับหน้าหลัก
</div>

<div class="notice">
📢<br><br>
ยังไม่ประกาศผล
</div>

</div>

<div class="page" id="complaintPage">

<div class="back" onclick="home()">
← กลับหน้าหลัก
</div>

<div class="notice">
📢<br><br>
ยังไม่เปิดให้ยื่นคำร้อง
</div>

</div>

<div class="page" id="examPage">

<div class="back" onclick="home()">
← กลับหน้าหลัก
</div>

<h2 style="text-align:center;color:#5B3FFF;">
ประกาศผลสอบเข้า
</h2>

<div class="choice">

<button onclick="chooseLevel('ม.1')">
มัธยมศึกษาปีที่ 1
</button>

<button onclick="chooseLevel('ม.4')">
มัธยมศึกษาปีที่ 4
</button>

</div>

<div class="searchBox" id="searchBox">

<h3 id="levelTitle"
style="margin-top:30px;color:#5B3FFF;">
</h3>

<input
id="examID"
placeholder="เลขประจำตัวสอบ">

<input
id="studentName"
placeholder="ชื่อ-นามสกุล">

<button onclick="searchResult()">
ค้นหาผลสอบ
</button>

</div>

<div id="resultArea"></div>

</div>

</div>

let level="";

function login(){

document.getElementById("login").style.display="none";

document.getElementById("dashboard").style.display="block";

}

function logout(){

location.reload();

}

function home(){

document.querySelectorAll(".page").forEach(p=>{

p.style.display="none";

});

}

function openGrade(){

home();

document.getElementById("gradePage").style.display="block";

}

function openComplaint(){

home();

document.getElementById("complaintPage").style.display="block";

}

function openExam(){

home();

document.getElementById("examPage").style.display="block";

}

function chooseLevel(x){

level=x;

document.getElementById("searchBox").style.display="block";

document.getElementById("levelTitle").innerHTML=
"ประกาศผลสอบเข้า "+x;

}
];

s.math+
s.thai+
s.english+
s.social;

s.average=
s.total/4;

s.standard=
(
s.math+
s.thai+
s.english+
s.social
)/4;

});

students.sort((a,b)=>b.total-a.total);

students.forEach((s,index)=>{

s.rank=index+1;

if(index<30){

s.status="ผ่านการคัดเลือก";

}else{

s.status="ไม่ผ่านการคัดเลือก";

}

});
