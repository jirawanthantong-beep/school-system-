	<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>เว็บไซต์โรงเรียน I.C.E.C</title>
<style>
body { font-family: Arial; background:#eef2f7; text-align:center; }
.box { background:white; padding:20px; margin:20px auto; width:380px; border-radius:10px; box-shadow:0 0 10px gray;}
input, select { padding:8px; margin:5px; width:90%; }
button { padding:10px; margin:5px; border:none; border-radius:5px; cursor:pointer; background:#6a5acd; color:white;}
.admin { background:#222; color:white; }
</style>
</head>

<body>

<h1>🏫 เว็บไซต์โรงเรียน I.C.E.C</h1>

<div class="box">
<h3>👩‍🏫 ลงเวลา (ก่อน 10:00)</h3>
<select id="teacher">
<option>พิตต้า</option>
<option>วันเฮง</option>
<option>ซีเกม</option>
<option>ข้าวหอม</option>
</select>
<input type="password" id="teacherPass" placeholder="รหัสครู">
<button onclick="checkIn()">ลงเวลา</button>
<p id="checkStatus"></p>
</div>

<div class="box">
<h3>📊 ใส่คะแนนนักเรียน</h3>

<select id="class">
<option>3/1</option>
<option>3/2</option>
<option>3/3</option>
</select>

<select id="student">
<option>1</option>
<option>2</option>
</select>

<select id="subject">
<option>ภาษาไทย</option>
<option>ภาษาอังกฤษ</option>
<option>สังคม</option>
<option>การงานอาชีพ</option>
<option>พละ</option>
<option>สุขศึกษา</option>
<option>ลูกเสือ</option>
<option>คณิต</option>
<option>วิทย์</option>
<option>ศิลปะ</option>
</select>

<input type="number" id="work" placeholder="คะแนนเก็บ (เต็ม 70)">
<input type="number" id="exam" placeholder="คะแนนสอบ (เต็ม 30)">

<button onclick="saveScore()">บันทึกคะแนน</button>
<p id="result"></p>
</div>

<div class="box admin">
<h3>🔐 ระบบแอดมิน</h3>
<input type="password" id="adminPass" placeholder="รหัสแอดมิน">
<button onclick="showAdmin()">ดูข้อมูล</button>
<pre id="adminReport"></pre>
</div>

<script>

let teacherPasswords = {
    "พิตต้า": "111",
    "วันเฮง": "222",
    "ซีเกม": "333",
    "ข้าวหอม": "444"
};

let adminPassword = "999";

let checkedTeachers = [];
let allTeachers = ["พิตต้า","วันเฮง","ซีเกม","ข้าวหอม"];
let scores = [];

function checkIn(){
    let name = document.getElementById("teacher").value;
    let pass = document.getElementById("teacherPass").value;
    let hour = new Date().getHours();

    if(pass !== teacherPasswords[name]){
        alert("รหัสผิด!");
        return;
    }

    document.getElementById("checkStatus").innerText =
    hour >= 10 ? "❌ มาสาย" : "✅ ลงเวลาแล้ว";

    if(!checkedTeachers.includes(name)){
        checkedTeachers.push(name);
    }
}

// เกรด A-F
function calcGrade(score){
    if(score >= 80) return {grade:"A", gpa:4.0};
    if(score >= 75) return {grade:"B+", gpa:3.5};
    if(score >= 70) return {grade:"B", gpa:3.0};
    if(score >= 65) return {grade:"C+", gpa:2.5};
    if(score >= 60) return {grade:"C", gpa:2.0};
    if(score >= 55) return {grade:"D+", gpa:1.5};
    if(score >= 50) return {grade:"D", gpa:1.0};
    return {grade:"F", gpa:0};
}

function saveScore(){
    let cls = document.getElementById("class").value;
    let stu = document.getElementById("student").value;
    let sub = document.getElementById("subject").value;
    let work = Number(document.getElementById("work").value);
    let exam = Number(document.getElementById("exam").value);

    // กันใส่เกิน
    if(work > 70 || exam > 30){
        alert("คะแนนเกิน! (เก็บไม่เกิน 70 / สอบไม่เกิน 30)");
        return;
    }

    // ✅ สูตรที่ถูกต้อง
    let total = work + exam;

    let result = calcGrade(total);

    scores.push({
        class: cls,
        student: stu,
        subject: sub,
        total: total,
        grade: result.grade
    });

    document.getElementById("result").innerText =
    `คะแนน ${total} / 100 | เกรด ${result.grade}`;
}

function showAdmin(){
    let pass = document.getElementById("adminPass").value;

    if(pass !== adminPassword){
        alert("รหัสแอดมินผิด!");
        return;
    }

    let text = "📌 ครูที่ยังไม่ลงเวลา:\n";

    let notChecked = allTeachers.filter(t => !checkedTeachers.includes(t));
    notChecked.forEach(t => text += "- " + t + "\n");

    text += "\n📊 คะแนนนักเรียน:\n";

    scores.forEach(s=>{
        text += `ห้อง ${s.class} เลขที่ ${s.student} ${s.subject} = ${s.total} (${s.grade})\n`;
    });

    document.getElementById("adminReport").innerText = text;
}

</script>

</body>
